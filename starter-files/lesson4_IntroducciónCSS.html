<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gym Pro</title>
  
  <!-- Aquí empieza el CSS interno que le da los colores y el diseño -->
  <style>
    body {
      background-color: #1A1A2E;
      color: #EAEAEA;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #FF6B35;
      font-size: 36px;
      margin-bottom: 4px;
    }

    .slogan {
      color: #F7C948;
      font-style: italic;
      font-size: 18px;
    }

    #servicios {
      background-color: #16213E;
      border-left: 4px solid #FF6B35;
      padding: 16px;
      margin-top: 20px;
    }

    #servicios li {
      margin-bottom: 8px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <!-- El título principal que usa el estilo de la etiqueta h1 -->
  <h1>Gym Pro</h1>

  <!-- El lema que usa el estilo de la clase .slogan -->
  <p class="slogan">
    Entrena duro. Descansa bien. Repite.
  </p>

  <!-- Texto normal que usa el estilo básico del body -->
  <p>Horario: Lun–Vie 6am a 10pm</p>

  <!-- La lista que usa los estilos del ID #servicios -->
  <ul id="servicios">
    <li>Pesas y cardio</li>
    <li>Clases grupales</li>
    <li>Nutrición personalizada</li>
  </ul>

</body>
</html>
